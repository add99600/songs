spring.application.name=back-end-springboot
server.port=${SERVER_PORT:8081}

# PostgreSQL (유저, 플레이리스트, 인증)
spring.datasource.url=jdbc:postgresql://localhost:9960/postgres
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL 로깅 (개발용)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# JWT
jwt.secret=${JWT_SECRET}

# OAuth2 리다이렉트 URI
oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5200}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5200}

# MongoDB (노래 데이터)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/songs}

# 노래 검색: true=MongoDB 우선 → API fallback, false=API만 사용
song.search.use-mongodb=${SONG_SEARCH_USE_MONGODB:false}

# Manana 노래방 API (크롤링 fallback)
manana.api.base-url=${MANANA_API_URL:https://api.manana.kr}
manana.api.default-brand=${MANANA_DEFAULT_BRAND:tj}

# 파일 로그
logging.file.name=logs/app.log
logging.level.org.example.backendspring=DEBUG
